<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=yes"
    />
    <title>广州鼎昌贸易商行 | 皮料·蕾丝·绒布</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#E0F7FA",
              secondary: "#4DD0E1",
              light: "#F5FCFF",
              text: "#263238",
            },
          },
        },
      };
    </script>
    <style>
      .cart-sidebar {
        transition: transform 0.3s ease-in-out;
        transform: translateX(100%);
      }
      .cart-sidebar.open {
        transform: translateX(0);
      }
      body.sidebar-open {
        overflow: hidden;
      }
      .quantity-input {
        width: 60px;
        text-align: center;
      }
      .product-images-modal {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: center;
      }
      .product-images-modal img {
        max-width: 100%;
        max-height: 400px;
        object-fit: contain;
        border-radius: 8px;
      }
    </style>
  </head>
  <body class="bg-primary text-text min-h-screen">
    <header class="py-8 px-4 bg-secondary/20">
      <div class="max-w-6xl mx-auto text-center">
        <h1 class="text-2xl md:text-4xl font-bold mb-3">广州鼎昌贸易商行</h1>
        <div class="flex flex-wrap justify-center gap-4 text-sm md:text-base">
          <span>📜 匠心皮料 · Crafted Leather</span>
          <span>🎩 质感匠艺 · Texture Master</span>
          <span>🌿 经久耐用 · Durable & Timeless</span>
        </div>
      </div>
    </header>

    <main class="py-10 px-4">
      <div class="max-w-6xl mx-auto">
        <h2 class="text-xl md:text-2xl font-semibold text-center mb-2">
          精品推荐
        </h2>
        <div class="flex justify-center flex-wrap gap-3 my-6">
          <button class="category-btn active" data-type="all">全部</button>
          <button class="category-btn" data-type="type1">加工工艺</button>
          <button class="category-btn" data-type="type2">蕾丝</button>
          <button class="category-btn" data-type="type3">绒布</button>
          <button class="category-btn" data-type="type4">视频</button>
        </div>
        <div
          id="productList"
          class="grid grid-cols-2 md:grid-cols-3 gap-4 md:gap-6"
        ></div>
      </div>
    </main>

    <footer class="bg-secondary/20 py-10 px-4 mt-8">
      <div class="max-w-6xl mx-auto">
        <div
          class="md:flex justify-between items-center gap-8 text-center md:text-left"
        >
          <div>
            <h3 class="text-lg font-bold mb-3">联系我们</h3>
            <p class="mb-2">
              <i class="fa-solid fa-location-dot mr-2"></i> 地址：中国 ·
              广州市南沙区环盛街2号2107室
            </p>
            <p class="mb-2">
              <i class="fa-solid fa-phone mr-2"></i> 电话：133 6055 9947
            </p>
            <p>
              <i class="fa-solid fa-envelope mr-2"></i>
              邮箱：yuansiping@zumar.com.cn
            </p>
          </div>
          <div class="mt-6 md:mt-0">
            <div class="bg-white p-2 rounded-lg inline-block">
              <img
                src="https://yuanhaochen.oss-cn-guangzhou.aliyuncs.com/%E9%9E%8B%E5%AD%90/%E5%BE%AE%E4%BF%A1%E5%9B%BE%E7%89%87_20260407200128_188_12.png"
                alt="微信二维码"
                class="w-28 h-28 object-cover"
              />
            </div>
            <p class="mt-2 text-sm">扫码添加微信了解更多</p>
          </div>
        </div>
        <div class="mt-8 text-center text-sm opacity-70">
          © 2025 广州鼎昌贸易商行 | 工作时间 10:00-18:00
        </div>
      </div>
    </footer>

    <button
      id="cartToggleBtn"
      class="fixed bottom-6 right-6 bg-secondary text-white p-4 rounded-full shadow-lg z-40 md:hidden"
    >
      <i class="fa-solid fa-cart-shopping text-xl"></i>
      <span
        id="cartCountBadge"
        class="absolute -top-2 -right-2 bg-red-500 text-white text-xs rounded-full h-5 w-5 flex items-center justify-center"
        >0</span
      >
    </button>

    <div
      id="cartSidebar"
      class="cart-sidebar fixed top-0 right-0 w-full md:w-96 h-full bg-white shadow-2xl z-50 flex flex-col"
    >
      <div
        class="p-4 border-b flex justify-between items-center bg-secondary/10"
      >
        <h2 class="text-xl font-bold">
          <i class="fa-solid fa-cart-shopping mr-2"></i>购物车
        </h2>
        <button id="closeCartBtn" class="text-2xl">&times;</button>
      </div>
      <div id="cartItems" class="flex-1 overflow-y-auto p-4 space-y-4"></div>
      <div class="border-t p-4 bg-gray-50">
        <div class="flex justify-between text-lg font-bold mb-3">
          <span>总计：</span>
          <span id="cartTotal">¥0.00</span>
        </div>
        <div class="space-y-2">
          <input
            type="text"
            id="customerName"
            placeholder="收货人姓名"
            class="w-full border rounded p-2 text-sm"
          />
          <input
            type="tel"
            id="customerPhone"
            placeholder="联系电话"
            class="w-full border rounded p-2 text-sm"
          />
          <textarea
            id="address"
            placeholder="详细地址"
            rows="2"
            class="w-full border rounded p-2 text-sm"
          ></textarea>
          <button
            id="submitOrderBtn"
            class="w-full bg-secondary text-white py-2 rounded-lg font-semibold hover:bg-secondary/80 transition"
          >
            提交订单
          </button>
        </div>
      </div>
    </div>

    <div
      id="modal"
      class="fixed inset-0 bg-black/50 z-50 hidden items-center justify-center p-4"
    >
      <div
        class="bg-primary rounded-2xl max-w-xl w-full max-h-[90vh] overflow-y-auto p-6 relative"
      >
        <button
          onclick="closeModal()"
          class="absolute top-4 right-4 w-8 h-8 flex items-center justify-center rounded-full bg-white shadow"
        >
          ✕
        </button>
        <div id="modalContent"></div>
      </div>
    </div>

    <script>
      let allProducts = [];
      let allVideos = [];
      let currentType = "all";
      let cart = [];

      const productListDiv = document.getElementById("productList");
      const cartSidebar = document.getElementById("cartSidebar");
      const cartToggleBtn = document.getElementById("cartToggleBtn");
      const closeCartBtn = document.getElementById("closeCartBtn");
      const cartItemsDiv = document.getElementById("cartItems");
      const cartTotalSpan = document.getElementById("cartTotal");
      const cartCountBadge = document.getElementById("cartCountBadge");
      const submitOrderBtn = document.getElementById("submitOrderBtn");

      const formatPrice = (price) => `¥${parseFloat(price).toFixed(2)}`;

      function updateCartUI() {
        if (cart.length === 0) {
          cartItemsDiv.innerHTML = `<div class="text-center text-gray-400 py-8">购物车还是空的～</div>`;
          cartTotalSpan.innerText = "¥0.00";
          cartCountBadge.innerText = "0";
          return;
        }
        let total = 0;
        let totalCount = 0;
        let html = "";
        cart.forEach((item, idx) => {
          const subtotal = item.price * item.quantity;
          total += subtotal;
          totalCount += item.quantity;
          html += `
          <div class="flex gap-3 border-b pb-3">
            <img src="${item.img}" class="w-16 h-16 object-cover rounded" />
            <div class="flex-1">
              <h4 class="font-bold">${escapeHtml(item.title)}</h4>
              <p class="text-secondary text-sm">${formatPrice(item.price)}</p>
              <div class="flex items-center gap-2 mt-1">
                <button class="cart-qty-dec text-gray-500 border px-2 rounded" data-idx="${idx}">-</button>
                <span class="w-8 text-center">${item.quantity}</span>
                <button class="cart-qty-inc text-gray-500 border px-2 rounded" data-idx="${idx}">+</button>
                <button class="cart-remove text-red-500 text-sm ml-2" data-idx="${idx}">删除</button>
              </div>
            </div>
            <div class="text-right">${formatPrice(subtotal)}</div>
          </div>
        `;
        });
        cartItemsDiv.innerHTML = html;
        cartTotalSpan.innerText = formatPrice(total);
        cartCountBadge.innerText = totalCount;

        document.querySelectorAll(".cart-qty-dec").forEach((btn) => {
          btn.addEventListener("click", (e) => {
            const idx = parseInt(btn.dataset.idx);
            if (cart[idx].quantity > 1) cart[idx].quantity--;
            else cart.splice(idx, 1);
            updateCartUI();
            saveCartToLocal();
            refreshProductGrid();
          });
        });
        document.querySelectorAll(".cart-qty-inc").forEach((btn) => {
          btn.addEventListener("click", (e) => {
            const idx = parseInt(btn.dataset.idx);
            const product = allProducts.find((p) => p.id === cart[idx].id);
            if (cart[idx].quantity < product.stock) {
              cart[idx].quantity++;
              updateCartUI();
              saveCartToLocal();
              refreshProductGrid();
            } else alert("库存不足");
          });
        });
        document.querySelectorAll(".cart-remove").forEach((btn) => {
          btn.addEventListener("click", (e) => {
            const idx = parseInt(btn.dataset.idx);
            cart.splice(idx, 1);
            updateCartUI();
            saveCartToLocal();
            refreshProductGrid();
          });
        });
      }

      function saveCartToLocal() {
        localStorage.setItem("shopCart", JSON.stringify(cart));
      }
      function loadCartFromLocal() {
        const saved = localStorage.getItem("shopCart");
        if (saved) {
          try {
            cart = JSON.parse(saved);
            cart = cart.filter((item) =>
              allProducts.find((p) => p.id === item.id && p.stock > 0),
            );
            updateCartUI();
          } catch (e) {
            cart = [];
          }
        }
      }

      function addToCart(product, quantity = 1) {
        if (quantity <= 0) return;
        if (product.stock < quantity) {
          alert(`「${product.title}」库存不足，仅剩 ${product.stock} 件`);
          return;
        }
        const existing = cart.find((item) => item.id === product.id);
        if (existing) {
          const newQty = existing.quantity + quantity;
          if (newQty > product.stock) {
            alert(
              `「${product.title}」库存不足，当前已有 ${existing.quantity} 件，最多再购 ${product.stock - existing.quantity} 件`,
            );
            return;
          }
          existing.quantity = newQty;
        } else {
          cart.push({
            id: product.id,
            title: product.title,
            price: product.price,
            stock: product.stock,
            quantity: quantity,
            img:
              product.images && product.images.length ? product.images[0] : "",
          });
        }
        updateCartUI();
        saveCartToLocal();
        cartSidebar.classList.add("open");
        document.body.classList.add("sidebar-open");
      }

      async function refreshProductGrid() {
        let html = "";
        if (currentType === "type4") {
          productListDiv.className =
            "grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-6";
          for (const v of allVideos) {
            html += `
            <div class="video-card bg-white rounded-xl shadow-sm hover:shadow-md transition overflow-hidden cursor-pointer" onclick="openVideoModal(${v.id})">
              <div class="relative h-44 w-full">
                <img src="${v.coverImg}" class="h-full w-full object-cover" alt="${escapeHtml(v.title)}">
                <div class="absolute inset-0 flex items-center justify-center bg-black/30">
                  <i class="fa-solid fa-play text-white text-4xl"></i>
                </div>
              </div>
              <div class="p-4">
                <h3 class="font-bold text-lg mb-1">${escapeHtml(v.title || "视频")}</h3>
                <p class="text-sm text-gray-600">${escapeHtml(v.intro || "")}</p>
              </div>
            </div>
          `;
          }
        } else {
          productListDiv.className =
            "grid grid-cols-2 md:grid-cols-3 gap-4 md:gap-6";
          let filtered =
            currentType === "all"
              ? allProducts
              : allProducts.filter((p) => p.type === currentType);
          for (const p of filtered) {
            const stockStatus =
              p.stock > 0
                ? `<span class="text-green-600 text-xs">库存 ${p.stock}</span>`
                : `<span class="text-red-500 text-xs">缺货</span>`;
            const coverImg =
              p.images && p.images.length
                ? p.images[0]
                : "https://placehold.co/400x300?text=无图";
            html += `
            <div class="product-card bg-white rounded-xl shadow-sm hover:shadow-md transition overflow-hidden flex flex-col">
              <div onclick="openProductModal(${p.id})" class="cursor-pointer">
                <img src="${coverImg}" class="h-40 w-full object-cover" onerror="this.src='https://placehold.co/400x300?text=无图'">
              </div>
              <div class="p-3 flex-1 flex flex-col">
                <div onclick="openProductModal(${p.id})" class="cursor-pointer">
                  <h3 class="font-bold text-base">${escapeHtml(p.title || "未命名产品")}</h3>
                  <p class="text-xs text-gray-500 line-clamp-1">${escapeHtml(p.intro || "")}</p>
                  <div class="flex justify-between items-center mt-1">
                    <span class="text-secondary font-bold">${formatPrice(p.price)}</span>
                    ${stockStatus}
                  </div>
                </div>
                <div class="mt-3 flex items-center gap-2">
                  <input type="number" min="1" max="${p.stock}" value="1" class="quantity-input border rounded px-1 py-1 text-sm w-16" data-id="${p.id}" id="qty_${p.id}">
                  <button class="buy-btn bg-secondary/80 hover:bg-secondary text-white text-sm px-3 py-1 rounded-full transition" data-id="${p.id}" data-stock="${p.stock}">购买</button>
                </div>
              </div>
            </div>
          `;
          }
        }
        productListDiv.innerHTML = html;
        document.querySelectorAll(".buy-btn").forEach((btn) => {
          btn.addEventListener("click", (e) => {
            e.stopPropagation();
            const productId = parseInt(btn.dataset.id);
            const product = allProducts.find((p) => p.id === productId);
            if (!product) return;
            const qtyInput = document.getElementById(`qty_${productId}`);
            let qty = parseInt(qtyInput.value);
            if (isNaN(qty) || qty < 1) qty = 1;
            addToCart(product, qty);
          });
        });
      }

      function openProductModal(id) {
        const product = allProducts.find((p) => p.id === id);
        if (!product) return;
        let imagesHtml = "";
        if (product.images && product.images.length) {
          imagesHtml =
            '<div class="product-images-modal grid grid-cols-1 gap-3">';
          product.images.forEach((img) => {
            imagesHtml += `<img src="${img}" class="rounded-lg w-full object-cover">`;
          });
          imagesHtml += "</div>";
        } else {
          imagesHtml = '<p class="text-gray-400">暂无图片</p>';
        }
        const content = `
        <h2 class="text-xl font-bold mb-2">${escapeHtml(product.title)}</h2>
        <p class="text-gray-600 mb-1">${escapeHtml(product.detail || "暂无详细介绍")}</p>
        <p class="text-secondary font-bold mb-3">${formatPrice(product.price)}  / 库存：${product.stock}</p>
        ${imagesHtml}
      `;
        document.getElementById("modalContent").innerHTML = content;
        document.getElementById("modal").style.display = "flex";
        document.body.style.overflow = "hidden";
      }

      function openVideoModal(id) {
        const video = allVideos.find((v) => v.id === id);
        if (!video) return;
        const content = `
        <h2 class="text-xl font-bold mb-3">${escapeHtml(video.title)}</h2>
        <p class="mb-4 text-gray-600">${escapeHtml(video.detail || "")}</p>
        <video controls class="rounded-lg w-full" poster="${video.coverImg}">
          <source src="${video.videoUrl}" type="video/mp4">
          浏览器不支持视频播放。
        </video>
      `;
        document.getElementById("modalContent").innerHTML = content;
        document.getElementById("modal").style.display = "flex";
        document.body.style.overflow = "hidden";
      }

      function closeModal() {
        document.getElementById("modal").style.display = "none";
        document.body.style.overflow = "auto";
      }

      function initFilters() {
        const btns = document.querySelectorAll(".category-btn");
        btns.forEach((btn) => {
          btn.addEventListener("click", async (e) => {
            btns.forEach((b) => b.classList.remove("active"));
            btn.classList.add("active");
            currentType = btn.dataset.type;
            await refreshProductGrid();
          });
        });
      }

      async function loadData() {
        try {
          const [prodRes, vidRes] = await Promise.all([
            fetch("https://admin.zumar.com.cn/api/products"),
            fetch("https://admin.zumar.com.cn/api/videos"),
          ]);
          if (!prodRes.ok) throw new Error("产品加载失败");
          allProducts = await prodRes.json();
          allVideos = await vidRes.json();
          allProducts.forEach((p) => {
            p.stock = p.stock || 0;
            p.price = p.price || 0;
          });
          await refreshProductGrid();
          loadCartFromLocal();
        } catch (err) {
          console.error(err);
          productListDiv.innerHTML = `<div class="col-span-full text-center text-red-500">数据加载失败，请确保后端服务已启动</div>`;
        }
      }

      async function submitOrder() {
        const name = document.getElementById("customerName").value.trim();
        const phone = document.getElementById("customerPhone").value.trim();
        const address = document.getElementById("address").value.trim();
        if (!name || !phone || !address) {
          alert("请完整填写姓名、电话和地址");
          return;
        }
        if (cart.length === 0) {
          alert("购物车是空的");
          return;
        }
        const items = cart.map((item) => ({
          productId: item.id,
          title: item.title,
          quantity: item.quantity,
          price: item.price,
        }));
        try {
          const res = await fetch("https://admin.zumar.com.cn/api/order", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              items,
              customerName: name,
              customerPhone: phone,
              address,
            }),
          });
          const data = await res.json();
          if (res.ok) {
            alert(`订单提交成功！订单号：${data.orderId}`);
            cart = [];
            updateCartUI();
            saveCartToLocal();
            await loadData();
            document.getElementById("customerName").value = "";
            document.getElementById("customerPhone").value = "";
            document.getElementById("address").value = "";
            cartSidebar.classList.remove("open");
            document.body.classList.remove("sidebar-open");
          } else {
            alert("下单失败：" + (data.error || "未知错误"));
            await loadData();
          }
        } catch (err) {
          alert("网络错误，请稍后重试");
          console.error(err);
        }
      }

      function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function (m) {
          if (m === "&") return "&amp;";
          if (m === "<") return "&lt;";
          if (m === ">") return "&gt;";
          return m;
        });
      }

      function initSidebar() {
        cartToggleBtn?.addEventListener("click", () => {
          cartSidebar.classList.add("open");
          document.body.classList.add("sidebar-open");
        });
        closeCartBtn.addEventListener("click", () => {
          cartSidebar.classList.remove("open");
          document.body.classList.remove("sidebar-open");
        });
        cartSidebar.addEventListener("click", (e) => {
          if (e.target === cartSidebar) {
            cartSidebar.classList.remove("open");
            document.body.classList.remove("sidebar-open");
          }
        });
        submitOrderBtn.addEventListener("click", submitOrder);
      }

      document.addEventListener("DOMContentLoaded", () => {
        initFilters();
        initSidebar();
        loadData();
      });
    </script>
  </body>
</html>
