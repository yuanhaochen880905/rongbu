<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>后台管理 - 广州鼎昌贸易商行</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      .preview-img {
        max-width: 80px;
        max-height: 80px;
        object-fit: cover;
        margin-right: 10px;
        border-radius: 8px;
      }
      .upload-area {
        border: 2px dashed #ccc;
        padding: 20px;
        text-align: center;
        cursor: pointer;
        transition: 0.3s;
        border-radius: 8px;
      }
      .upload-area:hover {
        background: #f8f8f8;
      }
      .image-item {
        display: inline-block;
        margin: 5px;
        position: relative;
      }
      .image-item .remove-btn {
        position: absolute;
        top: -8px;
        right: -8px;
        background: #ef4444;
        color: white;
        border-radius: 50%;
        width: 20px;
        height: 20px;
        font-size: 12px;
        cursor: pointer;
        text-align: center;
        line-height: 20px;
        border: 1px solid white;
        transition: background 0.2s;
      }
      .image-item .remove-btn:hover {
        background: #dc2626;
      }
      .image-preview-container {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 8px;
      }
    </style>
  </head>
  <body class="bg-gray-100 p-6">
    <div class="max-w-7xl mx-auto">
      <div class="flex justify-between items-center mb-2">
        <h1 class="text-3xl font-bold">后台管理</h1>
        <a
          href="order-manager.html"
          class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 transition-colors"
          >📋 查看订单</a
        >
      </div>
      <p class="text-gray-600 mb-6">
        管理产品、库存、价格、多张图片（自动上传阿里云OSS）
      </p>

      <!-- 新增产品表单 -->
      <div class="bg-white p-6 rounded shadow mb-8">
        <h2 class="text-xl font-semibold mb-4">➕ 新增产品</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <input
            type="text"
            id="newTitle"
            placeholder="产品名称"
            class="border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
          <select id="newType" class="border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option value="type1">加工工艺</option>
            <option value="type2">蕾丝</option>
            <option value="type3">绒布</option>
          </select>
          <input
            type="text"
            id="newIntro"
            placeholder="简介（如：9.9/y）"
            class="border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
          <textarea
            id="newDetail"
            placeholder="详细描述"
            rows="2"
            class="border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
          ></textarea>
          <input
            type="number"
            id="newPrice"
            placeholder="价格（元）"
            step="0.01"
            class="border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
          <input
            type="number"
            id="newStock"
            placeholder="库存数量"
            class="border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>
        <div class="mt-4">
          <label class="block font-semibold mb-2">产品图片（可多张）</label>
          <div
            id="newImagesContainer"
            class="image-preview-container"
          ></div>
          <button
            type="button"
            onclick="addNewImageUploader()"
            class="mt-2 bg-gray-200 px-3 py-1 rounded text-sm hover:bg-gray-300 transition-colors"
          >
            + 添加图片
          </button>
        </div>
        <button
          onclick="addProduct()"
          class="mt-4 bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700 transition-colors"
        >
          添加产品
        </button>
      </div>

      <!-- 现有产品列表 -->
      <div class="bg-white p-6 rounded shadow">
        <h2 class="text-xl font-semibold mb-4">📦 产品列表</h2>
        <div id="productList" class="space-y-4"></div>
      </div>
    </div>

    <script>
      const BASE_URL = "https://admin.zumar.com.cn/api";
      let newProductImages = [];

      // 前端文件基础校验（大小+格式提示）
      function beforeUpload(file) {
        const isLt5M = file.size / 1024 / 1024 < 5;
        const allowType = /\.(jpg|jpeg|png|gif|webp)$/i;
        const isImg = allowType.test(file.name);
        
        if (!isLt5M) {
          Swal.fire({
            icon: "error",
            title: "错误",
            text: "图片不能超过5MB",
            confirmButtonText: "确定"
          });
          return false;
        }
        
        if (!isImg) {
          Swal.fire({
            icon: "error",
            title: "错误",
            text: "仅支持 jpg/png/gif/webp 格式图片",
            confirmButtonText: "确定"
          });
          return false;
        }
        
        return true;
      }

      // 通用文件上传方法
      async function uploadFileToServer(file) {
        if (!file || !beforeUpload(file)) return null;
        
        const formData = new FormData();
        formData.append("file", file);
        
        try {
          const res = await fetch(`${BASE_URL}/upload`, {
            method: "POST",
            body: formData,
          });
          
          const data = await res.json();
          
          if (data.code === 200) {
            return data.data;
          } else {
            Swal.fire({
              icon: "error",
              title: "上传失败",
              text: data.msg || "服务器返回错误",
              confirmButtonText: "确定"
            });
            return null;
          }
        } catch (err) {
          Swal.fire({
            icon: "error",
            title: "网络异常",
            text: "请检查服务器状态或网络连接",
            confirmButtonText: "确定"
          });
          console.error("文件上传失败:", err);
          return null;
        }
      }

      // 新增产品 - 添加图片上传控件
      function addNewImageUploader(existingUrl = null) {
        const container = document.getElementById("newImagesContainer");
        const idx = container.children.length;
        const div = document.createElement("div");
        div.className = "image-item";
        
        div.innerHTML = `
          <div class="upload-area w-24 h-24 inline-block" onclick="triggerUpload(this, 'new_img_${idx}')">
            <i class="fa-solid fa-cloud-upload-alt text-2xl text-gray-400"></i>
            <p class="text-xs text-gray-500 mt-1">点击上传</p>
          </div>
          <input type="file" accept="image/*" style="display:none" onchange="handleNewImageUpload(this, 'new_img_${idx}')">
          <img id="new_img_${idx}" class="preview-img hidden" alt="预览图">
          <span class="remove-btn" onclick="removeNewImage(this)">×</span>
        `;
        
        // 如果是编辑模式传入已有图片
        if (existingUrl) {
          const img = div.querySelector("img");
          img.src = existingUrl;
          img.classList.remove("hidden");
          div.querySelector(".upload-area").style.display = "none";
          newProductImages.push(existingUrl);
        }
        
        container.appendChild(div);
      }

      // 触发文件选择框
      function triggerUpload(element, imgId) {
        element.nextElementSibling.click();
      }

      // 处理新增产品的图片上传
      async function handleNewImageUpload(fileInput, imgId) {
        const file = fileInput.files[0];
        const imageUrl = await uploadFileToServer(file);
        
        if (imageUrl) {
          const img = document.getElementById(imgId);
          img.src = imageUrl;
          img.classList.remove("hidden");
          fileInput.parentElement.querySelector(".upload-area").style.display = "none";
          newProductImages.push(imageUrl);
          
          Swal.fire({
            icon: "success",
            title: "上传成功",
            text: "图片上传完成",
            confirmButtonText: "确定",
            timer: 1500,
            showConfirmButton: false
          });
        }
        
        // 清空input值，允许重复选择同一文件
        fileInput.value = "";
      }

      // 移除新增产品的图片
      function removeNewImage(btn) {
        const div = btn.parentElement;
        const img = div.querySelector("img");
        
        if (img && img.src) {
          const url = img.src;
          const idx = newProductImages.indexOf(url);
          if (idx > -1) {
            newProductImages.splice(idx, 1);
          }
        }
        
        div.remove();
      }

      // 加载商品列表
      async function loadProducts() {
        try {
          const res = await fetch(`${BASE_URL}/products`);
          const result = await res.json();
          const products = result.data || [];
          const container = document.getElementById("productList");

          container.innerHTML = products
            .map((p) => {
              // 安全解析图片数组
              let productImages = [];
              try {
                productImages = JSON.parse(p.img || "[]");
                // 过滤无效图片链接
                productImages = productImages.filter(url => url && typeof url === 'string' && url.trim() !== '');
              } catch (e) {
                productImages = [];
                console.error(`解析产品${p.id}图片失败:`, e);
              }
              
              // 取第一张图作为预览
              const previewImg = productImages.length > 0 ? productImages[0] : '';
              
              return `
                <div class="border rounded p-4 bg-gray-50" data-id="${p.id}">
                  <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                      <label class="text-sm text-gray-600">标题</label>
                      <input id="title_${p.id}" value="${escapeHtml(p.name || '')}" class="w-full border p-1 rounded focus:outline-none focus:ring-1 focus:ring-blue-500 mt-1">
                      
                      <label class="text-sm text-gray-600 mt-2 block">类型</label>
                      <select id="type_${p.id}" class="w-full border p-1 rounded focus:outline-none focus:ring-1 focus:ring-blue-500 mt-1">
                        <option value="type1" ${p.type === "type1" ? "selected" : ""}>加工工艺</option>
                        <option value="type2" ${p.type === "type2" ? "selected" : ""}>蕾丝</option>
                        <option value="type3" ${p.type === "type3" ? "selected" : ""}>绒布</option>
                      </select>
                    </div>
                    
                    <div>
                      <label class="text-sm text-gray-600">价格 (元)</label>
                      <input id="price_${p.id}" type="number" step="0.01" value="${p.price || 0}" class="w-full border p-1 rounded focus:outline-none focus:ring-1 focus:ring-blue-500 mt-1">
                      
                      <label class="text-sm text-gray-600 mt-2 block">库存</label>
                      <input id="stock_${p.id}" type="number" value="${p.stock || 0}" class="w-full border p-1 rounded focus:outline-none focus:ring-1 focus:ring-blue-500 mt-1">
                      
                      <label class="text-sm text-gray-600 mt-2 block">简介</label>
                      <input id="intro_${p.id}" value="${escapeHtml(p.intro || '')}" class="w-full border p-1 rounded focus:outline-none focus:ring-1 focus:ring-blue-500 mt-1">
                      
                      <label class="text-sm text-gray-600 mt-2 block">预览图</label>
                      <img src="${previewImg}" width="80" class="mt-1 rounded" onerror="this.style.display='none'">
                    </div>
                    
                    <div>
                      <label class="text-sm text-gray-600">详情</label>
                      <textarea id="detail_${p.id}" rows="2" class="w-full border p-1 rounded focus:outline-none focus:ring-1 focus:ring-blue-500 mt-1">${escapeHtml(p.detail || "")}</textarea>
                      
                      <!-- 产品图片管理 -->
                      <label class="text-sm text-gray-600 mt-2 block">产品图片</label>
                      <div id="images_${p.id}" class="image-preview-container">
                        ${productImages.map((url, idx) => `
                          <div class="image-item">
                            <img src="${url}" class="preview-img" alt="产品图片${idx+1}" onerror="this.parentElement.remove()">
                            <span class="remove-btn" onclick="removeEditImage(${p.id}, ${idx})">×</span>
                          </div>
                        `).join('')}
                      </div>
                      <input type="hidden" id="images_hidden_${p.id}" value="${JSON.stringify(productImages)}">
                      <button type="button" onclick="addEditImage(${p.id})" class="mt-2 bg-gray-200 px-3 py-1 rounded text-sm hover:bg-gray-300 transition-colors">
                        + 添加图片
                      </button>
                      
                      <div class="flex mt-3 gap-2">
                        <button onclick="updateProduct(${p.id})" class="bg-green-500 text-white px-3 py-1 rounded hover:bg-green-600 transition-colors">保存修改</button>
                        <button onclick="deleteProduct(${p.id})" class="bg-red-500 text-white px-3 py-1 rounded hover:bg-red-600 transition-colors">删除产品</button>
                      </div>
                    </div>
                  </div>
                </div>
              `;
            })
            .join("");
        } catch (e) {
          console.error("加载商品异常：", e);
          Swal.fire({
            icon: "error",
            title: "加载失败",
            text: "商品列表加载出错，请刷新页面重试",
            confirmButtonText: "确定"
          });
        }
      }

      // 渲染编辑产品的图片列表
      function renderProductImages(productId, images) {
        // 过滤无效图片链接
        const validImages = images.filter(url => url && typeof url === 'string' && url.trim() !== '');
        const container = document.getElementById(`images_${productId}`);
        const hiddenInput = document.getElementById(`images_hidden_${productId}`);
        
        if (!container || !hiddenInput) return;
        
        // 更新隐藏输入框
        hiddenInput.value = JSON.stringify(validImages);
        
        // 渲染图片预览
        container.innerHTML = validImages.map((url, idx) => `
          <div class="image-item">
            <img src="${url}" class="preview-img" alt="产品图片${idx+1}" onerror="this.parentElement.remove()">
            <span class="remove-btn" onclick="removeEditImage(${productId}, ${idx})">×</span>
          </div>
        `).join('');
      }

      // 编辑产品 - 添加新图片
      async function addEditImage(productId) {
        const input = document.createElement("input");
        input.type = "file";
        input.accept = "image/*";
        
        input.onchange = async (e) => {
          const file = e.target.files[0];
          const imageUrl = await uploadFileToServer(file);
          
          if (imageUrl) {
            const hiddenInput = document.getElementById(`images_hidden_${productId}`);
            const currentImages = JSON.parse(hiddenInput.value || "[]");
            currentImages.push(imageUrl);
            
            renderProductImages(productId, currentImages);
            
            Swal.fire({
              icon: "success",
              title: "添加成功",
              text: "图片新增完成",
              confirmButtonText: "确定",
              timer: 1500,
              showConfirmButton: false
            });
          }
          
          // 清空input值
          input.value = "";
        };
        
        input.click();
      }

      // 移除编辑产品的图片
      function removeEditImage(productId, index) {
        const hiddenInput = document.getElementById(`images_hidden_${productId}`);
        const currentImages = JSON.parse(hiddenInput.value || "[]");
        
        // 删除指定索引的图片
        currentImages.splice(index, 1);
        
        // 重新渲染
        renderProductImages(productId, currentImages);
        
        Swal.fire({
          icon: "success",
          title: "已移除",
          text: "图片已成功删除",
          confirmButtonText: "确定",
          timer: 1000,
          showConfirmButton: false
        });
      }

      // 更新产品信息
      async function updateProduct(id) {
        try {
          const name = document.getElementById(`title_${id}`).value.trim();
          const type = document.getElementById(`type_${id}`).value;
          const intro = document.getElementById(`intro_${id}`).value.trim();
          const detail = document.getElementById(`detail_${id}`).value.trim();
          const price = Number(document.getElementById(`price_${id}`).value);
          const stock = Number(document.getElementById(`stock_${id}`).value);
          const imagesInput = document.getElementById(`images_hidden_${id}`);
          const imgs = JSON.parse(imagesInput.value || "[]");
          
          // 基本验证
          if (!name) {
            Swal.fire({
              icon: "warning",
              title: "验证失败",
              text: "产品名称不能为空",
              confirmButtonText: "确定"
            });
            return;
          }
          
          if (isNaN(price) || price < 0) {
            Swal.fire({
              icon: "warning",
              title: "验证失败",
              text: "请输入有效的价格",
              confirmButtonText: "确定"
            });
            return;
          }
          
          if (isNaN(stock) || stock < 0) {
            Swal.fire({
              icon: "warning",
              title: "验证失败",
              text: "请输入有效的库存数量",
              confirmButtonText: "确定"
            });
            return;
          }
          
          const res = await fetch(`${BASE_URL}/goods/${id}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              name,
              type,
              intro,
              detail,
              price,
              stock,
              img: JSON.stringify(imgs),
            }),
          });
          
          if (res.ok) {
            Swal.fire({
              icon: "success",
              title: "修改成功",
              text: "产品信息已更新",
              confirmButtonText: "确定",
              timer: 1500,
              showConfirmButton: false
            });
            loadProducts();
          } else {
            throw new Error("服务器返回错误");
          }
        } catch (err) {
          console.error("更新产品失败:", err);
          Swal.fire({
            icon: "error",
            title: "修改失败",
            text: "产品信息更新出错，请重试",
            confirmButtonText: "确定"
          });
        }
      }

      // 删除产品
      async function deleteProduct(id) {
        const result = await Swal.fire({
          title: "确认删除?",
          text: "此操作不可撤销，删除后产品数据将永久丢失！",
          icon: "warning",
          showCancelButton: true,
          confirmButtonColor: "#ef4444",
          cancelButtonColor: "#6b7280",
          confirmButtonText: "确认删除",
          cancelButtonText: "取消"
        });
        
        if (result.isConfirmed) {
          try {
            const res = await fetch(`${BASE_URL}/goods/${id}`, { 
              method: "DELETE" 
            });
            
            if (res.ok) {
              Swal.fire({
                icon: "success",
                title: "已删除",
                text: "产品已成功删除",
                confirmButtonText: "确定",
                timer: 1500,
                showConfirmButton: false
              });
              loadProducts();
            } else {
              throw new Error("删除请求失败");
            }
          } catch (err) {
            console.error("删除产品失败:", err);
            Swal.fire({
              icon: "error",
              title: "删除失败",
              text: "产品删除出错，请重试",
              confirmButtonText: "确定"
            });
          }
        }
      }

      // 添加新产品
      async function addProduct() {
        try {
          const name = document.getElementById("newTitle").value.trim();
          const type = document.getElementById("newType").value;
          const intro = document.getElementById("newIntro").value.trim();
          const detail = document.getElementById("newDetail").value.trim();
          const price = Number(document.getElementById("newPrice").value);
          const stock = Number(document.getElementById("newStock").value);
          const imgs = [...newProductImages]; // 复制数组
          
          // 表单验证
          if (!name) {
            Swal.fire({
              icon: "warning",
              title: "验证失败",
              text: "产品名称不能为空",
              confirmButtonText: "确定"
            });
            return;
          }
          
          if (imgs.length === 0) {
            Swal.fire({
              icon: "warning",
              title: "验证失败",
              text: "请至少上传一张产品图片",
              confirmButtonText: "确定"
            });
            return;
          }
          
          if (isNaN(price) || price < 0) {
            Swal.fire({
              icon: "warning",
              title: "验证失败",
              text: "请输入有效的价格",
              confirmButtonText: "确定"
            });
            return;
          }
          
          if (isNaN(stock) || stock < 0) {
            Swal.fire({
              icon: "warning",
              title: "验证失败",
              text: "请输入有效的库存数量",
              confirmButtonText: "确定"
            });
            return;
          }
          
          const res = await fetch(`${BASE_URL}/goods/add`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              name,
              type,
              intro,
              detail,
              price,
              stock,
              img: JSON.stringify(imgs),
            }),
          });
          
          if (res.ok) {
            Swal.fire({
              icon: "success",
              title: "新增成功",
              text: "产品已成功添加",
              confirmButtonText: "确定"
            });
            
            // 重置表单
            document.getElementById("newTitle").value = "";
            document.getElementById("newIntro").value = "";
            document.getElementById("newDetail").value = "";
            document.getElementById("newPrice").value = "";
            document.getElementById("newStock").value = "";
            document.getElementById("newImagesContainer").innerHTML = "";
            newProductImages = [];
            
            // 重新加载产品列表
            loadProducts();
          } else {
            throw new Error("新增请求失败");
          }
        } catch (err) {
          console.error("添加产品失败:", err);
          Swal.fire({
            icon: "error",
            title: "新增失败",
            text: "产品添加出错，请重试",
            confirmButtonText: "确定"
          });
        }
      }

      // HTML转义函数
      function escapeHtml(s) {
        if (!s) return "";
        return s.replace(
          /[&<>]/g,
          (m) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" })[m]
        );
      }

      // 页面初始化
      document.addEventListener('DOMContentLoaded', () => {
        loadProducts();
        
        // 挂载全局方法
        window.addProduct = addProduct;
        window.updateProduct = updateProduct;
        window.deleteProduct = deleteProduct;
        window.addNewImageUploader = addNewImageUploader;
        window.triggerUpload = triggerUpload;
        window.handleNewImageUpload = handleNewImageUpload;
        window.removeNewImage = removeNewImage;
        window.addEditImage = addEditImage;
        window.removeEditImage = removeEditImage;
        window.beforeUpload = beforeUpload;
      });
    </script>
  </body>
</html>
