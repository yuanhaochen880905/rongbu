<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>后台管理 - 广州鼎昌贸易商行</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      .preview-img {
        max-width: 80px;
        max-height: 80px;
        object-fit: cover;
        margin-right: 10px;
        border-radius: 8px;
      }
      .upload-area {
        border: 2px dashed #ccc;
        padding: 20px;
        text-align: center;
        cursor: pointer;
        transition: 0.3s;
        border-radius: 8px;
      }
      .upload-area:hover {
        background: #f8f8f8;
      }
      .image-item {
        display: inline-block;
        margin: 5px;
        position: relative;
      }
      .image-item .remove-btn {
        position: absolute;
        top: -8px;
        right: -8px;
        background: #ef4444;
        color: white;
        border-radius: 50%;
        width: 20px;
        height: 20px;
        font-size: 12px;
        cursor: pointer;
        text-align: center;
        line-height: 20px;
        border: 1px solid white;
      }
    </style>
  </head>
  <body class="bg-gray-100 p-6">
    <div class="max-w-7xl mx-auto">
      <div class="flex justify-between items-center mb-2">
        <h1 class="text-3xl font-bold">后台管理</h1>
        <a
          href="order-manager.html"
          class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700"
          >📋 查看订单</a
        >
      </div>
      <p class="text-gray-600 mb-6">
        管理产品、库存、价格、多张图片（自动上传阿里云OSS）
      </p>

      <!-- 新增产品表单 -->
      <div class="bg-white p-6 rounded shadow mb-8">
        <h2 class="text-xl font-semibold mb-4">➕ 新增产品</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <input
            type="text"
            id="newTitle"
            placeholder="产品名称"
            class="border p-2 rounded"
          />
          <select id="newType" class="border p-2 rounded">
            <option value="type1">加工工艺</option>
            <option value="type2">蕾丝</option>
            <option value="type3">绒布</option>
          </select>
          <input
            type="text"
            id="newIntro"
            placeholder="简介（如：9.9/y）"
            class="border p-2 rounded"
          />
          <textarea
            id="newDetail"
            placeholder="详细描述"
            rows="2"
            class="border p-2 rounded"
          ></textarea>
          <input
            type="number"
            id="newPrice"
            placeholder="价格（元）"
            step="0.01"
            class="border p-2 rounded"
          />
          <input
            type="number"
            id="newStock"
            placeholder="库存数量"
            class="border p-2 rounded"
          />
        </div>
        <div class="mt-4">
          <label class="block font-semibold mb-2">产品图片（可多张）</label>
          <div
            id="newImagesContainer"
            class="flex flex-wrap items-center gap-2"
          ></div>
          <button
            type="button"
            onclick="addNewImageUploader()"
            class="mt-2 bg-gray-200 px-3 py-1 rounded text-sm hover:bg-gray-300"
          >
            + 添加图片
          </button>
        </div>
        <button
          onclick="addProduct()"
          class="mt-4 bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700"
        >
          添加产品
        </button>
      </div>

      <!-- 现有产品列表 -->
      <div class="bg-white p-6 rounded shadow">
        <h2 class="text-xl font-semibold mb-4">📦 产品列表</h2>
        <div id="productList" class="space-y-4"></div>
      </div>
    </div>

    <script>
      const BASE_URL = "https://admin.zumar.com.cn/api";
      let newProductImages = [];

      // 文件校验
      function beforeUpload(file) {
        const isLt5M = file.size / 1024 / 1024 < 5;
        const allowType = /\.(jpg|jpeg|png|gif|webp)$/i;
        const isImg = allowType.test(file.name);
        if (!isLt5M) {
          Swal.fire("错误", "图片不能超过5MB", "error");
          return false;
        }
        if (!isImg) {
          Swal.fire("错误", "仅支持 jpg/png/gif/webp 格式图片", "error");
          return false;
        }
        return true;
      }

      // 新增图片上传控件
      function addNewImageUploader(existingUrl = null) {
        const container = document.getElementById("newImagesContainer");
        const idx = container.children.length;
        const div = document.createElement("div");
        div.className = "image-item";
        div.innerHTML = `
        <div class="upload-area w-24 h-24 inline-block" onclick="triggerUpload(this, 'new_img_${idx}')">
          <i class="fa-solid fa-cloud-upload-alt text-2xl text-gray-400"></i>
          <p class="text-xs text-gray-500 mt-1">点击上传</p>
        </div>
        <input type="file" style="display:none" onchange="uploadNewImage(this, 'new_img_${idx}')">
        <img id="new_img_${idx}" class="preview-img hidden" alt="预览图">
        <span class="remove-btn" onclick="removeNewImage(this)">×</span>
      `;
        if (existingUrl) {
          const img = div.querySelector("img");
          img.src = existingUrl;
          img.classList.remove("hidden");
          div.querySelector(".upload-area").style.display = "none";
          newProductImages.push(existingUrl);
        }
        container.appendChild(div);
      }

      function triggerUpload(element, imgId) {
        element.nextElementSibling.click();
      }

      // 修复后的图片上传函数（核心！）
      async function uploadNewImage(fileInput, imgId) {
        const file = fileInput.files[0];
        if (!file || !beforeUpload(file)) return;

        const formData = new FormData();
        formData.append("file", file);

        try {
          const res = await fetch(`${BASE_URL}/upload`, {
            method: "POST",
            body: formData,
          });
          const data = await res.json();

          // 关键修复：确保正确读取后端返回的URL
          if (data.code === 200 && data.data) {
            const imageUrl = data.data;
            const img = document.getElementById(imgId);
            img.src = imageUrl;
            img.classList.remove("hidden");
            img.style.display = "block";
            fileInput.parentElement.querySelector(
              ".upload-area",
            ).style.display = "none";
            newProductImages.push(imageUrl);
            Swal.fire("成功", "图片已上传", "success");
          } else {
            Swal.fire("上传失败", data.msg || "服务器返回错误", "error");
          }
        } catch (err) {
          Swal.fire("错误", "网络或服务器异常", "error");
        }
      }

      function removeNewImage(btn) {
        const div = btn.parentElement;
        const img = div.querySelector("img");
        if (img && img.src) {
          const url = img.src;
          const idx = newProductImages.indexOf(url);
          if (idx > -1) newProductImages.splice(idx, 1);
        }
        div.remove();
      }

      // 修复后的商品列表加载函数
      async function loadProducts() {
        try {
          const res = await fetch(`${BASE_URL}/products`);
          const result = await res.json();

          // 关键修复：确保 products 是数组
          const products = Array.isArray(result.data) ? result.data : [];
          const container = document.getElementById("productList");

          container.innerHTML = products
            .map((p) => {
              let imgSrc = "";
              try {
                const imgArr = JSON.parse(p.img || "[]");
                imgSrc =
                  Array.isArray(imgArr) && imgArr.length ? imgArr[0] : "";
              } catch (e) {
                imgSrc = "";
              }
              return `
            <div class="border rounded p-4 bg-gray-50" data-id="${p.id}">
              <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                  <label>标题</label>
                  <input id="title_${p.id}" value="${escapeHtml(p.name)}" class="w-full border p-1 rounded">
                </div>
                <div>
                  <label>价格/库存</label>
                  <input id="price_${p.id}" type="number" step="0.01" value="${p.price}" class="w-full border p-1 rounded">
                  <input id="stock_${p.id}" type="number" value="${p.stock}" class="w-full border p-1 rounded">
                  <img src="${imgSrc}" width="80" onerror="this.style.display='none'">
                </div>
                <div>
                  <button onclick="updateProduct(${p.id})" class="bg-green-500 text-white px-3 py-1 rounded">保存</button>
                  <button onclick="deleteProduct(${p.id})" class="bg-red-500 text-white px-3 py-1 rounded">删除</button>
                </div>
              </div>
            </div>
          `;
            })
            .join("");
        } catch (e) {
          console.error("加载商品异常：", e);
        }
      }

      function escapeHtml(s) {
        if (!s) return "";
        return s.replace(
          /[&<>]/g,
          (m) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" })[m],
        );
      }

      async function addProduct() {
        const name = document.getElementById("newTitle").value;
        const price = Number(document.getElementById("newPrice").value);
        const stock = Number(document.getElementById("newStock").value);
        const imgs = newProductImages;
        if (!name || imgs.length < 1) {
          Swal.fire("必填项", "请填写名称并上传图片", "warning");
          return;
        }
        const res = await fetch(`${BASE_URL}/goods/add`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            name,
            price,
            stock,
            img: JSON.stringify(imgs),
          }),
        });
        if (res.ok) {
          Swal.fire("新增成功", "", "success");
          document.getElementById("newTitle").value = "";
          document.getElementById("newImagesContainer").innerHTML = "";
          newProductImages = [];
          loadProducts();
        }
      }

      async function updateProduct(id) {
        const name = document.getElementById(`title_${id}`).value;
        const price = Number(document.getElementById(`price_${id}`).value);
        const stock = Number(document.getElementById(`stock_${id}`).value);
        const res = await fetch(`${BASE_URL}/goods/${id}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, price, stock }),
        });
        if (res.ok) {
          Swal.fire("修改成功", "", "success");
          loadProducts();
        }
      }

      async function deleteProduct(id) {
        const confirm = await Swal.fire({
          title: "确认删除?",
          showCancelButton: true,
        });
        if (confirm.isConfirmed) {
          await fetch(`${BASE_URL}/goods/${id}`, { method: "DELETE" });
          Swal.fire("已删除", "", "success");
          loadProducts();
        }
      }

      // 页面初始化
      loadProducts();
      window.addProduct = addProduct;
      window.updateProduct = updateProduct;
      window.deleteProduct = deleteProduct;
      window.addNewImageUploader = addNewImageUploader;
      window.triggerUpload = triggerUpload;
      window.uploadNewImage = uploadNewImage;
      window.removeNewImage = removeNewImage;
      window.beforeUpload = beforeUpload;
    </script>
  </body>
</html>
